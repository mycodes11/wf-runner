name: Build Remote Home - iOS

on:
  repository_dispatch:
    types: [build-ios]
  workflow_dispatch:
    inputs:
      source_repo:
        description: 'Source repo to clone (e.g. username/repo-name)'
        required: true
        type: string
      branch:
        description: 'Branch to build'
        required: false
        default: 'main'
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build-ios:
    runs-on: macos-15  # Apple Silicon with Xcode 16 (Swift 6) pre-installed
    timeout-minutes: 45

    steps:

      - name: Resolve source target
        run: |
          SOURCE_REPO="${{ github.event.inputs.source_repo || github.event.client_payload.source_repo || 'supulvinod/pro-nxt' }}"
          SOURCE_BRANCH="${{ github.event.inputs.branch || github.event.client_payload.branch || 'main' }}"
          echo "SOURCE_REPO=$SOURCE_REPO" >> "$GITHUB_ENV"
          echo "SOURCE_BRANCH=$SOURCE_BRANCH" >> "$GITHUB_ENV"
          echo "Using source: $SOURCE_REPO@$SOURCE_BRANCH (releases upload to source repo)"
      # ---- Update pending status (or create if manual dispatch) -----
      - name: Update build status
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_AUTH: ${{ secrets.FIREBASE_DATABASE_SECRET }}
        run: |
          # Use pending_id from app if provided, otherwise create our own for manual triggers
          PENDING_ID="${{ github.event.client_payload.pending_id }}"
          if [ -z "$PENDING_ID" ]; then
            # Manual trigger - create the pending entry
            PENDING_ID="build-ios-pending-${GITHUB_RUN_ID}"
            curl -s -X PUT "${FIREBASE_DATABASE_URL}/buildReleases/${PENDING_ID}.json?auth=${FIREBASE_AUTH}" \
              -H "Content-Type: application/json" \
              -d "{\"id\":\"${PENDING_ID}\",\"platform\":\"ios\",\"status\":\"building\",\"createdAt\":$(date +%s000),\"runId\":\"${GITHUB_RUN_ID}\",\"source\":\"workflow\"}" &
          else
            # App trigger - just update with runId
            curl -s -X PATCH "${FIREBASE_DATABASE_URL}/buildReleases/${PENDING_ID}.json?auth=${FIREBASE_AUTH}" \
              -H "Content-Type: application/json" \
              -d "{\"runId\":\"${GITHUB_RUN_ID}\",\"workflowStarted\":$(date +%s000)}" &
          fi
          echo "PENDING_ID=$PENDING_ID" >> $GITHUB_ENV
          
          # Write initial log entry immediately so logs appear right away
          curl -s -X POST "${FIREBASE_DATABASE_URL}/buildLogs/${PENDING_ID}/lines.json?auth=${FIREBASE_AUTH}" \
            -H "Content-Type: application/json" \
            -d "{\"step\":\"init\",\"text\":\"🚀 Build started...\",\"ts\":$(date +%s000)}" > /dev/null 2>&1 &
          
          # Define log streaming function for real-time logs
          # Creates buildLogs/{PENDING_ID} with live output
          cat > /tmp/stream_log.sh << 'LOGFUNC'
          #!/bin/bash
          # Stream logs to Firebase in real-time
          # Usage: some_command 2>&1 | stream_log "step_name"
          STEP_NAME="$1"
          LOG_BUFFER=""
          LINE_COUNT=0
          while IFS= read -r line; do
            echo "$line"  # Still output to console
            LOG_BUFFER="${LOG_BUFFER}${line}\n"
            LINE_COUNT=$((LINE_COUNT + 1))
            # Flush to Firebase every 10 lines or if line contains key markers
            if [ $LINE_COUNT -ge 10 ] || echo "$line" | grep -qE '^\[|✅|❌|⚠️|Error|error:|warning:'; then
              if [ -n "$FIREBASE_DATABASE_URL" ] && [ -n "$FIREBASE_AUTH" ] && [ -n "$PENDING_ID" ]; then
                # Append to logs array
                ESCAPED=$(echo -e "$LOG_BUFFER" | jq -Rs .)
                curl -s -X POST "${FIREBASE_DATABASE_URL}/buildLogs/${PENDING_ID}/lines.json?auth=${FIREBASE_AUTH}" \
                  -H "Content-Type: application/json" \
                  -d "{\"step\":\"${STEP_NAME}\",\"text\":${ESCAPED},\"ts\":$(date +%s000)}" > /dev/null 2>&1 &
              fi
              LOG_BUFFER=""
              LINE_COUNT=0
            fi
          done
          # Flush remaining
          if [ -n "$LOG_BUFFER" ] && [ -n "$FIREBASE_DATABASE_URL" ] && [ -n "$FIREBASE_AUTH" ] && [ -n "$PENDING_ID" ]; then
            ESCAPED=$(echo -e "$LOG_BUFFER" | jq -Rs .)
            curl -s -X POST "${FIREBASE_DATABASE_URL}/buildLogs/${PENDING_ID}/lines.json?auth=${FIREBASE_AUTH}" \
              -H "Content-Type: application/json" \
              -d "{\"step\":\"${STEP_NAME}\",\"text\":${ESCAPED},\"ts\":$(date +%s000)}" > /dev/null 2>&1 || true
          fi
          LOGFUNC
          chmod +x /tmp/stream_log.sh

      # ----- Clean up old iOS build releases -----
      - name: Clean up old iOS build releases
        env:
          PAT: ${{ secrets.SOURCE_REPO_PAT || github.token }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_AUTH: ${{ secrets.FIREBASE_DATABASE_SECRET }}
        run: |
          # Stream log immediately
          curl -s -X POST "${FIREBASE_DATABASE_URL}/buildLogs/${PENDING_ID}/lines.json?auth=${FIREBASE_AUTH}" \
            -H "Content-Type: application/json" \
            -d "{\"step\":\"cleanup\",\"text\":\"🗑️ Cleaning up old releases...\",\"ts\":$(date +%s000)}" > /dev/null 2>&1 &
          
          # Clean up releases from source repo (where artifacts are hosted)
          PUBLIC_REPO="${SOURCE_REPO}"

          echo "🗑️ Cleaning up old iOS build releases from ${PUBLIC_REPO}..."
          OLD_RELEASES=$(curl -s \
            -H "Authorization: token $PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${PUBLIC_REPO}/releases?per_page=100")

          echo "$OLD_RELEASES" | jq -r '.[] | select(.tag_name | startswith("ios-build-")) | "\(.id) \(.tag_name)"' | while read RELEASE_ID RELEASE_TAG; do
            echo "  Deleting release: $RELEASE_TAG"
            curl -s -X DELETE \
              -H "Authorization: token $PAT" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${PUBLIC_REPO}/releases/${RELEASE_ID}"
            curl -s -X DELETE \
              -H "Authorization: token $PAT" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${PUBLIC_REPO}/git/refs/tags/${RELEASE_TAG}" 2>/dev/null || true

            # Also remove from Firebase buildReleases + associated notification
            if [ -n "$FIREBASE_DATABASE_URL" ] && [ -n "$FIREBASE_AUTH" ]; then
              BUILD_ID="build-${RELEASE_TAG}"
              curl -s -X DELETE "${FIREBASE_DATABASE_URL}/buildReleases/${BUILD_ID}.json?auth=${FIREBASE_AUTH}" > /dev/null 2>&1 || true
              echo "    Removed Firebase entry: ${BUILD_ID}"
            fi
          done

          # Also clean up any Firebase buildReleases that no longer have a matching GitHub release
          if [ -n "$FIREBASE_DATABASE_URL" ] && [ -n "$FIREBASE_AUTH" ]; then
            echo "🔍 Syncing Firebase buildReleases with GitHub..."
            # Get all existing GitHub release tags
            EXISTING_TAGS=$(echo "$OLD_RELEASES" | jq -r '.[].tag_name' 2>/dev/null || echo "")

            # Get all Firebase buildRelease IDs
            FB_RELEASES=$(curl -s "${FIREBASE_DATABASE_URL}/buildReleases.json?auth=${FIREBASE_AUTH}&shallow=true" 2>/dev/null || echo "{}")
            if [ "$FB_RELEASES" != "null" ] && [ "$FB_RELEASES" != "{}" ] && [ -n "$FB_RELEASES" ]; then
              echo "$FB_RELEASES" | jq -r 'keys[]' 2>/dev/null | while read FB_ID; do
                # Extract tag from build ID (build-ios-build-YYYYMMDD-HHMMSS -> ios-build-YYYYMMDD-HHMMSS)
                TAG_FROM_ID="${FB_ID#build-}"
                if echo "$TAG_FROM_ID" | grep -q "^ios-build-"; then
                  if ! echo "$EXISTING_TAGS" | grep -qF "$TAG_FROM_ID"; then
                    echo "  Removing orphaned Firebase entry: ${FB_ID}"
                    curl -s -X DELETE "${FIREBASE_DATABASE_URL}/buildReleases/${FB_ID}.json?auth=${FIREBASE_AUTH}" > /dev/null 2>&1 || true
                  fi
                fi
                # Clean up stale pending entries (older than 2 hours)
                if echo "$FB_ID" | grep -q "pending"; then
                  ENTRY_DATA=$(curl -s "${FIREBASE_DATABASE_URL}/buildReleases/${FB_ID}.json?auth=${FIREBASE_AUTH}" 2>/dev/null)
                  CREATED_AT=$(echo "$ENTRY_DATA" | jq -r '.createdAt // 0')
                  NOW_MS=$(date +%s000)
                  AGE_MS=$((NOW_MS - CREATED_AT))
                  TWO_HOURS_MS=7200000
                  if [ "$AGE_MS" -gt "$TWO_HOURS_MS" ]; then
                    echo "  Removing stale pending entry: ${FB_ID} (age: $((AGE_MS / 60000)) minutes)"
                    curl -s -X DELETE "${FIREBASE_DATABASE_URL}/buildReleases/${FB_ID}.json?auth=${FIREBASE_AUTH}" > /dev/null 2>&1 || true
                    curl -s -X DELETE "${FIREBASE_DATABASE_URL}/buildLogs/${FB_ID}.json?auth=${FIREBASE_AUTH}" > /dev/null 2>&1 || true
                  fi
                fi
              done
            fi
          fi
          echo "✅ Old releases cleaned up" &

      # ----- Clone source project (supports private repos via PAT) -----
      - name: Clone source repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.SOURCE_BRANCH }}
          token: ${{ secrets.SOURCE_REPO_PAT || github.token }}
          fetch-depth: 1
          sparse-checkout: |
            remote_home
            packages/spacenxt_ops_ui
          sparse-checkout-cone-mode: true

      - name: Log checkout complete
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_AUTH: ${{ secrets.FIREBASE_DATABASE_SECRET }}
        run: |
          curl -s -X POST "${FIREBASE_DATABASE_URL}/buildLogs/${PENDING_ID}/lines.json?auth=${FIREBASE_AUTH}" \
            -H "Content-Type: application/json" \
            -d "{\"step\":\"checkout\",\"text\":\"✅ Source cloned successfully\",\"ts\":$(date +%s000)}" > /dev/null 2>&1 || true

      # ----- Setup Flutter with caching -----
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-remotehome-ios-${{ runner.os }}-stable

      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Flutter version
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_AUTH: ${{ secrets.FIREBASE_DATABASE_SECRET }}
        run: |
          VERSION=$(flutter --version 2>&1 | head -1)
          echo "$VERSION"
          curl -s -X POST "${FIREBASE_DATABASE_URL}/buildLogs/${PENDING_ID}/lines.json?auth=${FIREBASE_AUTH}" \
            -H "Content-Type: application/json" \
            -d "{\"step\":\"flutter\",\"text\":\"🔧 $VERSION\",\"ts\":$(date +%s000)}" > /dev/null 2>&1 || true

      # ----- Create iOS project if missing -----
      - name: Ensure iOS project exists
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_AUTH: ${{ secrets.FIREBASE_DATABASE_SECRET }}
        working-directory: remote_home
        run: |
          if [ ! -d "ios" ]; then
            echo "iOS directory not found. Creating iOS platform files..."
            curl -s -X POST "${FIREBASE_DATABASE_URL}/buildLogs/${PENDING_ID}/lines.json?auth=${FIREBASE_AUTH}" \
              -H "Content-Type: application/json" \
              -d "{\"step\":\"ios\",\"text\":\"📁 Creating iOS project...\",\"ts\":$(date +%s000)}" > /dev/null 2>&1 &
            flutter create --platforms=ios . 2>&1
          else
            curl -s -X POST "${FIREBASE_DATABASE_URL}/buildLogs/${PENDING_ID}/lines.json?auth=${FIREBASE_AUTH}" \
              -H "Content-Type: application/json" \
              -d "{\"step\":\"ios\",\"text\":\"✅ iOS project exists\",\"ts\":$(date +%s000)}" > /dev/null 2>&1 || true
          fi

      # ----- Add push notification capabilities to iOS -----
      - name: Configure iOS push notification capabilities
        working-directory: remote_home
        run: |
          # 1. Add background modes + push notification to Info.plist
          PLIST="ios/Runner/Info.plist"
          if [ -f "$PLIST" ]; then
            # Add UIBackgroundModes for remote-notification and fetch
            if ! grep -q "UIBackgroundModes" "$PLIST"; then
              echo "Adding UIBackgroundModes to Info.plist..."
              # Insert before closing </dict></plist>
              sed -i '' '/<\/dict>/i\
              <key>UIBackgroundModes</key>\
              <array>\
                <string>remote-notification</string>\
                <string>fetch</string>\
              </array>
              ' "$PLIST"
              echo "✅ UIBackgroundModes added"
            else
              echo "✅ UIBackgroundModes already present"
            fi
          fi

          # 2. Create push notification entitlements file
          ENTITLEMENTS="ios/Runner/Runner.entitlements"
          if [ ! -f "$ENTITLEMENTS" ]; then
            echo "Creating Runner.entitlements for push notifications..."
            cat > "$ENTITLEMENTS" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>aps-environment</key>
            <string>development</string>
          </dict>
          </plist>
          EOF
            echo "✅ Runner.entitlements created"
          else
            echo "✅ Runner.entitlements already exists"
          fi

          # 3. Add entitlements to Xcode project build settings
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"
          if [ -f "$PBXPROJ" ] && ! grep -q "Runner.entitlements" "$PBXPROJ"; then
            echo "Adding entitlements to Xcode build settings..."
            # Add CODE_SIGN_ENTITLEMENTS to both Debug and Release
            sed -i '' 's/INFOPLIST_FILE = Runner\/Info.plist;/INFOPLIST_FILE = Runner\/Info.plist;\n\t\t\t\tCODE_SIGN_ENTITLEMENTS = Runner\/Runner.entitlements;/g' "$PBXPROJ"
            echo "✅ Entitlements added to Xcode project"
          else
            echo "✅ Entitlements already in Xcode project"
          fi

      # ----- Cache and install dependencies -----
      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            remote_home/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('remote_home/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Get Flutter dependencies
        shell: bash
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_AUTH: ${{ secrets.FIREBASE_DATABASE_SECRET }}
        working-directory: remote_home
        run: |
          # Update Firebase status
          curl -s -X PATCH "${FIREBASE_DATABASE_URL}/buildReleases/${PENDING_ID}.json?auth=${FIREBASE_AUTH}" \
            -H "Content-Type: application/json" \
            -d '{"step":"dependencies","stepLabel":"Getting dependencies..."}' &
          
          # Stream ALL pub get output
          flutter pub get 2>&1 | while IFS= read -r line; do
            echo "$line"
            ESCAPED=$(echo "$line" | jq -Rs .)
            curl -s -X POST "${FIREBASE_DATABASE_URL}/buildLogs/${PENDING_ID}/lines.json?auth=${FIREBASE_AUTH}" \
              -H "Content-Type: application/json" \
              -d "{\"step\":\"deps\",\"text\":${ESCAPED},\"ts\":$(date +%s000)}" > /dev/null 2>&1 &
          done

      # ----- Generate app icons for iOS (skip if already generated) -----
      - name: Generate iOS app icons
        working-directory: remote_home
        run: |
          if [ -f "ios/Runner/Assets.xcassets/AppIcon.appiconset/Icon-App-1024x1024@1x.png" ]; then
            echo "✅ App icons already generated, skipping"
          else
            echo "🎨 Generating app icons..."
            dart run flutter_launcher_icons 2>&1
          fi

      # ----- Verify firebase_options.dart exists -----
      - name: Verify Firebase config
        working-directory: remote_home
        run: |
          if [ ! -f "lib/firebase_options.dart" ]; then
            echo "❌ firebase_options.dart not found in repo!"
            exit 1
          fi
          echo "✅ firebase_options.dart found"

      # ----- Create GoogleService-Info.plist for iOS Firebase -----
      # ----- Ensure GoogleService-Info.plist is in place -----
      - name: Verify GoogleService-Info.plist
        working-directory: remote_home
        run: |
          if [ ! -f "ios/Runner/GoogleService-Info.plist" ]; then
            echo "⚠️ GoogleService-Info.plist not found, copying from repo root if available..."
            mkdir -p ios/Runner
            if [ -f "GoogleService-Info.plist" ]; then
              cp GoogleService-Info.plist ios/Runner/
            else
              echo "❌ GoogleService-Info.plist not found!"
              exit 1
            fi
          fi
          echo "✅ GoogleService-Info.plist ready"

      # ----- Ensure GoogleService-Info.plist is in Xcode project -----
      - name: Add GoogleService-Info.plist to Xcode project
        working-directory: remote_home
        run: |
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"
          if ! grep -q "GoogleService-Info.plist" "$PBXPROJ"; then
            echo "Adding GoogleService-Info.plist to Xcode project..."
            python3 << 'PYEOF'
          import re

          pbxproj = "ios/Runner.xcodeproj/project.pbxproj"
          with open(pbxproj, "r") as f:
              content = f.read()

          # Add PBXFileReference
          file_ref = '\t\t3A4B5C6D7E8F90A1B2C3D4E5 /* GoogleService-Info.plist */ = {isa = PBXFileReference; fileEncoding = 4; lastKnownFileType = text.plist.xml; path = "GoogleService-Info.plist"; sourceTree = "<group>"; };\n'
          content = content.replace("/* End PBXFileReference section */", file_ref + "/* End PBXFileReference section */")

          # Add PBXBuildFile
          build_file = '\t\t4A5B6C7D8E9F01A2B3C4D5E6 /* GoogleService-Info.plist in Resources */ = {isa = PBXBuildFile; fileRef = 3A4B5C6D7E8F90A1B2C3D4E5 /* GoogleService-Info.plist */; };\n'
          content = content.replace("/* End PBXBuildFile section */", build_file + "/* End PBXBuildFile section */")

          # Add to Runner group children (after Info.plist)
          content = content.replace(
              "97C147021CF9000F007C117D /* Info.plist */,",
              "97C147021CF9000F007C117D /* Info.plist */,\n\t\t\t\t3A4B5C6D7E8F90A1B2C3D4E5 /* GoogleService-Info.plist */,"
          )

          # Add to Resources build phase (after Main.storyboard)
          content = content.replace(
              "97C146FC1CF9000F007C117D /* Main.storyboard in Resources */,",
              "97C146FC1CF9000F007C117D /* Main.storyboard in Resources */,\n\t\t\t\t4A5B6C7D8E9F01A2B3C4D5E6 /* GoogleService-Info.plist in Resources */,"
          )

          with open(pbxproj, "w") as f:
              f.write(content)

          print("Done")
          PYEOF
            echo "✅ GoogleService-Info.plist added to Xcode project"
          else
            echo "✅ GoogleService-Info.plist already in Xcode project"
          fi

      # ----- Fix iOS deployment target -----
      - name: Fix iOS deployment target
        working-directory: remote_home
        run: |
          cd ios
          # Update or add Podfile minimum iOS version
          if grep -q "platform :ios" Podfile; then
            sed -i '' "s/platform :ios, '.*'/platform :ios, '13.0'/" Podfile
          else
            sed -i '' "1s/^/platform :ios, '13.0'\n/" Podfile
          fi

      # ----- Cache CocoaPods (Pods + specs repo) -----
      - name: Cache CocoaPods
        id: pods-cache
        uses: actions/cache@v4
        with:
          path: |
            remote_home/ios/Pods
            remote_home/ios/Podfile.lock
            ~/.cocoapods/repos
            ~/Library/Caches/CocoaPods
          key: pods-${{ runner.os }}-${{ hashFiles('remote_home/ios/Podfile', 'remote_home/pubspec.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Install CocoaPods dependencies
        shell: bash
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_AUTH: ${{ secrets.FIREBASE_DATABASE_SECRET }}
        working-directory: remote_home
        run: |
          cd ios
          # Update Firebase status
          curl -s -X PATCH "${FIREBASE_DATABASE_URL}/buildReleases/${PENDING_ID}.json?auth=${FIREBASE_AUTH}" \
            -H "Content-Type: application/json" \
            -d '{"step":"pods","stepLabel":"Installing CocoaPods..."}' &
          # Skip pod install if cache hit and Manifest.lock matches Podfile.lock
          if [ "${{ steps.pods-cache.outputs.cache-hit }}" == "true" ] && \
             [ -f "Pods/Manifest.lock" ] && \
             cmp -s "Podfile.lock" "Pods/Manifest.lock"; then
            echo "✅ Pods cache valid, skipping install"
            # Stream to Firebase
            curl -s -X POST "${FIREBASE_DATABASE_URL}/buildLogs/${PENDING_ID}/lines.json?auth=${FIREBASE_AUTH}" \
              -H "Content-Type: application/json" \
              -d '{"step":"pods","text":"✅ Pods cache valid, skipping install","ts":'$(date +%s000)'}' > /dev/null 2>&1 &
          else
            echo "🔄 Installing pods..."
            # Stream ALL pod install output
            (pod install --deployment --no-repo-update 2>&1 || pod install --no-repo-update 2>&1 || pod install 2>&1) | while IFS= read -r line; do
              echo "$line"
              ESCAPED=$(echo "$line" | jq -Rs .)
              curl -s -X POST "${FIREBASE_DATABASE_URL}/buildLogs/${PENDING_ID}/lines.json?auth=${FIREBASE_AUTH}" \
                -H "Content-Type: application/json" \
                -d "{\"step\":\"pods\",\"text\":${ESCAPED},\"ts\":$(date +%s000)}" > /dev/null 2>&1 &
            done
          fi

      # ----- Build unsigned IPA -----
      - name: Build Flutter iOS (no codesign)
        shell: bash
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_AUTH: ${{ secrets.FIREBASE_DATABASE_SECRET }}
        working-directory: remote_home
        run: |
          # Update Firebase status
          curl -s -X PATCH "${FIREBASE_DATABASE_URL}/buildReleases/${PENDING_ID}.json?auth=${FIREBASE_AUTH}" \
            -H "Content-Type: application/json" \
            -d '{"step":"compiling","stepLabel":"Compiling iOS app..."}' &
          
          # Stream ALL build logs to Firebase in real-time
          flutter build ipa --release --no-codesign --no-tree-shake-icons --suppress-analytics 2>&1 | while IFS= read -r line; do
            echo "$line"
            ESCAPED=$(echo "$line" | jq -Rs .)
            curl -s -X POST "${FIREBASE_DATABASE_URL}/buildLogs/${PENDING_ID}/lines.json?auth=${FIREBASE_AUTH}" \
              -H "Content-Type: application/json" \
              -d "{\"step\":\"compile\",\"text\":${ESCAPED},\"ts\":$(date +%s000)}" > /dev/null 2>&1 &
          done
          echo "✅ Flutter iOS archive build completed"

      - name: Create unsigned IPA from archive
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_AUTH: ${{ secrets.FIREBASE_DATABASE_SECRET }}
        working-directory: remote_home
        run: |
          # Update Firebase status
          curl -s -X PATCH "${FIREBASE_DATABASE_URL}/buildReleases/${PENDING_ID}.json?auth=${FIREBASE_AUTH}" \
            -H "Content-Type: application/json" \
            -d '{"step":"packaging","stepLabel":"Creating IPA..."}' &
          mkdir -p build/ios/ipa
          # Extract .app from xcarchive and package as IPA
          APP_PATH="build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ Runner.app not found in archive!"
            find build/ios/archive -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi
          
          # ----- Inject loose icon PNGs into .app bundle for ESign/Feather -----
          # Modern Xcode compiles icons into Assets.car (binary), but sideloading
          # tools need loose PNG files matching CFBundleIconFiles entries.
          ICON_SRC="assets/icon/app_icon_ios.png"
          if [ -f "$ICON_SRC" ]; then
            echo "🎨 Injecting icon PNGs into Runner.app for sideloading tools..."
            sips -z 120 120 "$ICON_SRC" --out "$APP_PATH/AppIcon60x60@2x.png" > /dev/null 2>&1 || true
            sips -z 180 180 "$ICON_SRC" --out "$APP_PATH/AppIcon60x60@3x.png" > /dev/null 2>&1 || true
            sips -z 152 152 "$ICON_SRC" --out "$APP_PATH/AppIcon76x76@2x.png" > /dev/null 2>&1 || true
            sips -z 167 167 "$ICON_SRC" --out "$APP_PATH/AppIcon83.5x83.5@2x.png" > /dev/null 2>&1 || true
            echo "  ✅ Icon PNGs injected: $(ls -la "$APP_PATH"/AppIcon*.png 2>/dev/null | wc -l) files"
          else
            echo "  ⚠️ Source icon not found at $ICON_SRC"
          fi
          
          mkdir -p /tmp/Payload
          cp -r "$APP_PATH" /tmp/Payload/
          
          # Copy iTunesArtwork for sideloading tools (ESign/Feather library icon)
          if [ -f "$ICON_SRC" ]; then
            cp "$ICON_SRC" /tmp/iTunesArtwork
            echo "✅ iTunesArtwork added from source dark icon"
          fi
          
          cd /tmp && zip -qr "$GITHUB_WORKSPACE/remote_home/build/ios/ipa/remote-home-unsigned.ipa" Payload iTunesArtwork 2>/dev/null || zip -qr "$GITHUB_WORKSPACE/remote_home/build/ios/ipa/remote-home-unsigned.ipa" Payload
          rm -rf /tmp/Payload /tmp/iTunesArtwork
          echo "✅ IPA created: $(du -h $GITHUB_WORKSPACE/remote_home/build/ios/ipa/remote-home-unsigned.ipa | cut -f1)"

      # ----- Upload IPA as a release artifact to PUBLIC repo -----
      - name: Upload unsigned IPA
        env:
          PAT: ${{ secrets.SOURCE_REPO_PAT || github.token }}
        working-directory: remote_home
        run: |
          # Upload to source repo (regardless of builder repo)
          PUBLIC_REPO="${SOURCE_REPO}"
          IPA_PATH="build/ios/ipa/remote-home-unsigned.ipa"
          TAG="ios-build-$(date +%Y%m%d-%H%M%S)"

          echo "📦 IPA size: $(du -h $IPA_PATH | cut -f1)"
          echo "📤 Uploading to PUBLIC repo: ${PUBLIC_REPO}"

          # Create a release on the source repo
          echo "Creating release ${TAG} on ${PUBLIC_REPO}..."

          # Create release
          RELEASE_RESPONSE=$(curl -s -X POST \
            -H "Authorization: token ${PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${PUBLIC_REPO}/releases" \
            -d "{\"tag_name\":\"${TAG}\",\"name\":\"iOS Build ${TAG}\",\"body\":\"Unsigned IPA built by CI from ${SOURCE_REPO}\",\"draft\":false,\"prerelease\":false}")

          UPLOAD_URL=$(echo "$RELEASE_RESPONSE" | grep -o '"upload_url": "[^"]*' | sed 's/"upload_url": "//' | sed 's/{.*//')

          if [ -z "$UPLOAD_URL" ]; then
            echo "❌ Failed to create release. Response:"
            echo "$RELEASE_RESPONSE"
            echo ""
            echo "⚠️ IPA was still built successfully but upload failed."
            exit 1
          fi

          # Upload IPA to the release
          UPLOAD_RESPONSE=$(curl -s -X POST \
            -H "Authorization: token ${PAT}" \
            -H "Content-Type: application/octet-stream" \
            "${UPLOAD_URL}?name=SpaceNxt.ipa" \
            --data-binary @"$IPA_PATH")

          # Extract the browser download URL from the upload response
          BROWSER_DOWNLOAD_URL=$(echo "$UPLOAD_RESPONSE" | jq -r '.browser_download_url // empty')

          if [ -z "$BROWSER_DOWNLOAD_URL" ]; then
            echo "⚠️ Upload may have failed. Response:"
            echo "$UPLOAD_RESPONSE"
            exit 1
          else
            echo "✅ IPA uploaded to public repo: ${BROWSER_DOWNLOAD_URL}"
          fi

          RELEASE_URL="https://github.com/${PUBLIC_REPO}/releases/tag/${TAG}"
          echo "✅ Release page: ${RELEASE_URL}"

          # Export variables for the notification step
          echo "BUILD_TAG=${TAG}" >> $GITHUB_ENV
          echo "RELEASE_URL=${RELEASE_URL}" >> $GITHUB_ENV
          echo "IPA_SIZE=$(stat -f%z "$IPA_PATH" 2>/dev/null || stat -c%s "$IPA_PATH" 2>/dev/null || echo 0)" >> $GITHUB_ENV
          echo "ASSET_DOWNLOAD_URL=${BROWSER_DOWNLOAD_URL}" >> $GITHUB_ENV

      # ----- Notify admin users about new build via Firebase -----
      - name: Notify admins about new build
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_AUTH: ${{ secrets.FIREBASE_DATABASE_SECRET }}
          PAT: ${{ secrets.SOURCE_REPO_PAT || github.token }}
        run: |
          if [ -z "$FIREBASE_DATABASE_URL" ] || [ -z "$FIREBASE_AUTH" ]; then
            echo "⚠️ Firebase secrets not set, skipping build notification"
            exit 0
          fi

          # Remove the pending build entry (uses PENDING_ID set earlier in workflow)
          if [ -n "$PENDING_ID" ]; then
            curl -s -X DELETE "${FIREBASE_DATABASE_URL}/buildReleases/${PENDING_ID}.json?auth=${FIREBASE_AUTH}" > /dev/null 2>&1 || true
            # Also clean up real-time logs
            curl -s -X DELETE "${FIREBASE_DATABASE_URL}/buildLogs/${PENDING_ID}.json?auth=${FIREBASE_AUTH}" > /dev/null 2>&1 || true
          fi

          if [ -z "$BUILD_TAG" ]; then
            echo "⚠️ No BUILD_TAG set (upload step may have failed), skipping notification"
            exit 0
          fi

          REPO="${SOURCE_REPO}"
          TAG="${BUILD_TAG}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          TIMESTAMP_MS=$(date +%s000)
          BUILD_ID="build-${TAG}"

          # Get last commit message and export for later steps
          COMMIT_SHA=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          COMMIT_MSG=$(git log -1 --pretty=%B 2>/dev/null | head -1 || echo "No commit message")
          echo "COMMIT_SHA=${COMMIT_SHA}" >> $GITHUB_ENV
          echo "COMMIT_MSG=${COMMIT_MSG}" >> $GITHUB_ENV

          # Get admin user UIDs from Firebase
          echo "📡 Fetching admin users from Firebase..."
          USERS_JSON=$(curl -s "${FIREBASE_DATABASE_URL}/users.json?auth=${FIREBASE_AUTH}")

          if [ -z "$USERS_JSON" ] || [ "$USERS_JSON" = "null" ]; then
            echo "⚠️ No users found in Firebase, skipping notification"
            exit 0
          fi

          # Extract admin UIDs (users with role=admin)
          ADMIN_UIDS=$(echo "$USERS_JSON" | jq -r '[to_entries[] | select(.value.role == "admin") | .key] | join(",")')

          if [ -z "$ADMIN_UIDS" ]; then
            echo "⚠️ No admin users found, skipping notification"
            exit 0
          fi

          # Format as JSON array
          ADMIN_UIDS_JSON=$(echo "$ADMIN_UIDS" | jq -R 'split(",")' 2>/dev/null || echo "[]")
          ADMIN_COUNT=$(echo "$ADMIN_UIDS_JSON" | jq 'length')
          echo "  Found ${ADMIN_COUNT} admin user(s)"

          # Write build release to Firebase
          echo "📝 Writing build release to Firebase..."
          curl -s -X PUT "${FIREBASE_DATABASE_URL}/buildReleases/${BUILD_ID}.json?auth=${FIREBASE_AUTH}" \
            -H "Content-Type: application/json" \
            -d "{
              \"id\": \"${BUILD_ID}\",
              \"platform\": \"ios\",
              \"version\": \"${TAG}\",
              \"downloadUrl\": \"${ASSET_DOWNLOAD_URL}\",
              \"releaseUrl\": \"${RELEASE_URL}\",
              \"buildNumber\": \"${GITHUB_RUN_NUMBER:-0}\",
              \"commitSha\": \"${COMMIT_SHA}\",
              \"commitMessage\": $(echo "$COMMIT_MSG" | jq -Rs .),
              \"createdAt\": ${TIMESTAMP_MS},
              \"fileSizeBytes\": ${IPA_SIZE:-0},
              \"status\": \"success\",
              \"notifiedUids\": ${ADMIN_UIDS_JSON}
            }"
          echo "  ✅ Build release recorded"

          # Send notification to admin users
          NOTIFICATION_ID="build-notif-$(date +%s)-$RANDOM"
          echo "📬 Sending build notification to admins..."
          # Use jq to safely construct the JSON with proper escaping
          NOTIFICATION_JSON=$(jq -n \
            --arg id "$NOTIFICATION_ID" \
            --arg title "New iOS Build Available" \
            --arg message "Build ${TAG} is ready for download" \
            --arg senderUid "system" \
            --arg senderName "CI Build System" \
            --argjson recipientUids "$ADMIN_UIDS_JSON" \
            --arg createdAt "$TIMESTAMP" \
            --arg buildReleaseId "$BUILD_ID" \
            '{
              id: $id,
              title: $title,
              message: $message,
              senderUid: $senderUid,
              senderName: $senderName,
              recipientUids: $recipientUids,
              sentToAll: false,
              createdAt: $createdAt,
              isRead: false,
              buildReleaseId: $buildReleaseId
            }')
          curl -s -X PUT "${FIREBASE_DATABASE_URL}/notifications/${NOTIFICATION_ID}.json?auth=${FIREBASE_AUTH}" \
            -H "Content-Type: application/json" \
            -d "$NOTIFICATION_JSON"
          echo "  ✅ Build notification sent to ${ADMIN_COUNT} admin(s)"

      # ----- Update ESign source JSON with latest release info -----
      - name: Update ESign source JSON
        if: success()
        env:
          PAT: ${{ secrets.SOURCE_REPO_PAT }}
        working-directory: remote_home
        run: |
          if [ -z "$BUILD_TAG" ] || [ -z "$ASSET_DOWNLOAD_URL" ]; then
            echo "⚠️ No build tag or download URL, skipping esign.json update"
            exit 0
          fi

          if [ -z "$PAT" ]; then
            echo "ℹ️ SOURCE_REPO_PAT not set, skipping sourceurl sync"
            exit 0
          fi
          
          # Clone the public sourceurl repo
          echo "📥 Cloning sourceurl repo..."
          if ! git clone --depth 1 "https://x-access-token:${PAT}@github.com/supulvinod/sourceurl.git" /tmp/sourceurl; then
            echo "⚠️ Unable to access supulvinod/sourceurl with the current SOURCE_REPO_PAT, skipping sourceurl sync"
            exit 0
          fi
          cd /tmp/sourceurl
          
          ESIGN_FILE="esign.json"
          if [ ! -f "$ESIGN_FILE" ]; then
            echo "⚠️ esign.json not found in sourceurl repo, creating it..."
            echo '{"name":"SpaceNxt","identifier":"com.sn.rm","subtitle":"Smart Home & Workflow Apps","description":"SpaceNxt apps for smart home control, admin management, and workflow automation.","iconURL":"https://raw.githubusercontent.com/supulvinod/sourceurl/master/icon_rm.png","sourceURL":"https://raw.githubusercontent.com/supulvinod/sourceurl/master/esign.json","apps":[{"name":"RemoteHome","bundleIdentifier":"com.sn.rm","developerName":"SpaceNxt","subtitle":"Remote Home","version":"1.0.0","versionDate":"2026-02-15","versionDescription":"Initial release","downloadURL":"https://github.com/supulvinod/sourceurl/releases","localizedDescription":"RemoteHome by SpaceNxt - Smart home control and automation.","iconURL":"https://raw.githubusercontent.com/supulvinod/sourceurl/master/icon_rm.png","tintColor":"6366F1","size":50000000,"versions":[{"version":"1.0.0","date":"2026-02-15","localizedDescription":"Initial release","downloadURL":"https://github.com/supulvinod/sourceurl/releases","size":50000000}]},{"name":"AdminPanel","bundleIdentifier":"com.sn.rm.admin","developerName":"SpaceNxt","subtitle":"Admin Panel","version":"1.0.0","versionDate":"2026-03-03","versionDescription":"Admin Panel - Initial release","downloadURL":"https://github.com/supulvinod/sourceurl/releases","localizedDescription":"AdminPanel for SpaceNxt - Manage devices and users.","iconURL":"https://raw.githubusercontent.com/supulvinod/sourceurl/master/icon_admin.png","tintColor":"8B5CF6","size":50000000,"versions":[{"version":"1.0.0","date":"2026-03-03","localizedDescription":"Admin Panel - Initial release","downloadURL":"https://github.com/supulvinod/sourceurl/releases","size":50000000}]},{"name":"WorkflowManager","bundleIdentifier":"com.sn.rm.releases","developerName":"SpaceNxt","subtitle":"Workflow Manager","version":"1.0.0","versionDate":"2026-03-03","versionDescription":"Workflow Manager - Initial release","downloadURL":"https://github.com/supulvinod/sourceurl/releases","localizedDescription":"WorkflowManager for SpaceNxt - Automate workflows and builds.","iconURL":"https://raw.githubusercontent.com/supulvinod/sourceurl/master/icon_wfm.png","tintColor":"EC4899","size":50000000,"versions":[{"version":"1.0.0","date":"2026-03-03","localizedDescription":"Workflow Manager - Initial release","downloadURL":"https://github.com/supulvinod/sourceurl/releases","size":50000000}]}],"news":[]}' | jq . > "$ESIGN_FILE"
          fi
          
          # Get current version from pubspec.yaml in the source repo
          APP_VERSION=$(grep "^version:" "$GITHUB_WORKSPACE/remote_home/pubspec.yaml" | sed 's/version: //' | cut -d'+' -f1 || echo "1.0.0")
          VERSION_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S+00:00")
          FILE_SIZE=${IPA_SIZE:-0}
          
          # Build version description with release time and commit info
          RELEASE_TIME=$(date -u +"%b %d, %Y at %H:%M UTC")
          COMMIT_SHA_SHORT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          VERSION_DESC=$(printf "RemoteHome v%s\n\nReleased: %s\n\nChanges:\n- [%s] %s" "$APP_VERSION" "$RELEASE_TIME" "$COMMIT_SHA_SHORT" "${COMMIT_MSG:-No commit message}")
          
          echo "📝 Updating esign.json in sourceurl repo..."
          echo "  Version: $APP_VERSION"
          echo "  Date: $VERSION_DATE"
          echo "  Size: $FILE_SIZE bytes"
          echo "  URL: $ASSET_DOWNLOAD_URL"
          echo "  Desc: $VERSION_DESC"
          
          # Update esign.json using jq with proper escaping
          jq --arg version "$APP_VERSION" \
             --arg versionDate "$VERSION_DATE" \
             --arg downloadUrl "$ASSET_DOWNLOAD_URL" \
             --arg versionDesc "$VERSION_DESC" \
             --arg releaseTime "$RELEASE_TIME" \
             --argjson size "$FILE_SIZE" \
             '.apps[0].version = $version |
              .apps[0].versionDate = $versionDate |
              .apps[0].downloadURL = $downloadUrl |
              .apps[0].versionDescription = $versionDesc |
              .apps[0].subtitle = ("Remote Home · " + $releaseTime) |
              .apps[0].localizedDescription = ("RemoteHome v" + $version + " by SpaceNxt\nReleased: " + $releaseTime + "\nSmart home control and automation.") |
              .apps[0].size = $size |
              .apps[0].versions = [{"version": $version, "date": $versionDate, "localizedDescription": $versionDesc, "downloadURL": $downloadUrl, "size": $size}] + (.apps[0].versions // [])' \
             "$ESIGN_FILE" > "${ESIGN_FILE}.tmp" && mv "${ESIGN_FILE}.tmp" "$ESIGN_FILE"
          
          echo "  ✅ esign.json updated"
          cat "$ESIGN_FILE"
          
          # Copy app icons to sourceurl repo (using dark background icons)
          cp "$GITHUB_WORKSPACE/remote_home/assets/icon/app_icon_ios.png" icon_rm.png 2>/dev/null || cp "$GITHUB_WORKSPACE/remote_home/assets/icon/app_icon.png" icon_rm.png 2>/dev/null || true
          cp "$GITHUB_WORKSPACE/admin_panel/assets/icon/app_icon_admin_ios_dark.png" icon_admin.png 2>/dev/null || cp "$GITHUB_WORKSPACE/admin_panel/assets/icon/app_icon_admin.png" icon_admin.png 2>/dev/null || true
          cp "$GITHUB_WORKSPACE/workflow_manager/assets/icon/app_icon_code_ios.png" icon_wfm.png 2>/dev/null || cp "$GITHUB_WORKSPACE/workflow_manager/assets/icon/app_icon_code.png" icon_wfm.png 2>/dev/null || true

          # Commit and push to sourceurl repo
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add esign.json icon_rm.png icon_admin.png icon_wfm.png
          if git diff --cached --quiet; then
            echo "ℹ️ No changes to esign.json"
          else
            git commit -m "Update esign.json for build ${BUILD_TAG} [ci-bot]"
            PUSH_OK=false
            for i in 1 2 3; do
              if git pull --rebase origin master && git push; then
                PUSH_OK=true
                break
              fi
              echo "⚠️ Push failed (attempt $i), retrying..."
              sleep 2
            done
            if [ "$PUSH_OK" = "true" ]; then
              echo "✅ esign.json pushed to sourceurl repo"
            else
              echo "⚠️ Failed to push sourceurl sync after 3 attempts; continuing without failing the build"
            fi
          fi
          
          cd "$GITHUB_WORKSPACE"

      - name: Commit iOS project files to source repo
        working-directory: remote_home
        run: |
          BRANCH="${SOURCE_BRANCH}"

          # Clean build artifacts before committing
          rm -rf build
          rm -rf .dart_tool

          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          # Add iOS project files
          git add ios/ 2>/dev/null || true

          # Check if there are any changes to commit
          if git diff --cached --quiet; then
            echo "ℹ️ No iOS changes to commit"
          else
            git commit -m "Update iOS project files [ci-bot]"
            git push origin HEAD:${BRANCH}
            echo "✅ iOS changes pushed (branch: ${BRANCH})"
          fi
