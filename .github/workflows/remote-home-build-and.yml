name: Build Remote Home - Android

on:
  repository_dispatch:
    types: [build-android]
  workflow_dispatch:
    inputs:
      source_repo:
        description: 'Source repo to clone (e.g. username/repo-name)'
        required: true
        type: string
      branch:
        description: 'Branch to build'
        required: false
        default: 'main'
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      - name: Resolve source target
        run: |
          SOURCE_REPO="${{ github.event.inputs.source_repo || github.event.client_payload.source_repo || 'supulvinod/pro-nxt' }}"
          SOURCE_BRANCH="${{ github.event.inputs.branch || github.event.client_payload.branch || 'main' }}"
          echo "SOURCE_REPO=$SOURCE_REPO" >> "$GITHUB_ENV"
          echo "SOURCE_BRANCH=$SOURCE_BRANCH" >> "$GITHUB_ENV"
          echo "Using source: $SOURCE_REPO@$SOURCE_BRANCH (releases upload to source repo)"
      # ----- Read logging preference from Firebase -----
      - name: Check logging preference
        id: logging
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_AUTH: ${{ secrets.FIREBASE_DATABASE_SECRET }}
        run: |
          LOGGING=$(curl -sf "${FIREBASE_DATABASE_URL}/settings/workflows/build-and.yml/loggingEnabled.json?auth=${FIREBASE_AUTH}" 2>/dev/null || echo "true")
          LOGGING=$(echo "$LOGGING" | tr -d '"')
          if [ "$LOGGING" = "false" ]; then
            echo "ENABLE_LOGGING=false" >> $GITHUB_ENV
            echo "📝 Logging: DISABLED"
          else
            echo "ENABLE_LOGGING=true" >> $GITHUB_ENV
            echo "📝 Logging: ENABLED"
          fi

      # ----- Update pending status (or create if manual dispatch) -----
      - name: Update build status
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_AUTH: ${{ secrets.FIREBASE_DATABASE_SECRET }}
        run: |
          PENDING_ID="${{ github.event.client_payload.pending_id }}"
          if [ -z "$PENDING_ID" ]; then
            PENDING_ID="build-android-pending-${GITHUB_RUN_ID}"
            curl -s -X PUT "${FIREBASE_DATABASE_URL}/buildReleases/${PENDING_ID}.json?auth=${FIREBASE_AUTH}" \
              -H "Content-Type: application/json" \
              -d "{\"id\":\"${PENDING_ID}\",\"platform\":\"android\",\"status\":\"building\",\"createdAt\":$(date +%s000),\"runId\":\"${GITHUB_RUN_ID}\",\"source\":\"workflow\"}" &
          else
            curl -s -X PATCH "${FIREBASE_DATABASE_URL}/buildReleases/${PENDING_ID}.json?auth=${FIREBASE_AUTH}" \
              -H "Content-Type: application/json" \
              -d "{\"runId\":\"${GITHUB_RUN_ID}\",\"workflowStarted\":$(date +%s000)}" &
          fi
          echo "PENDING_ID=$PENDING_ID" >> $GITHUB_ENV

          # Define firebase_log helper
          cat > /tmp/firebase_log.sh << 'LOGHELPER'
          #!/bin/bash
          if [ "$ENABLE_LOGGING" != "true" ]; then exit 0; fi
          STEP="$1"; TEXT="$2"
          if [ -n "$FIREBASE_DATABASE_URL" ] && [ -n "$FIREBASE_AUTH" ] && [ -n "$PENDING_ID" ]; then
            ESCAPED=$(echo "$TEXT" | jq -Rs .)
            curl -sf -X POST "${FIREBASE_DATABASE_URL}/buildLogs/${PENDING_ID}/lines.json?auth=${FIREBASE_AUTH}" \
              -H "Content-Type: application/json" \
              -d "{\"step\":\"${STEP}\",\"text\":${ESCAPED},\"ts\":$(date +%s000)}" > /dev/null 2>&1 &
          fi
          LOGHELPER
          chmod +x /tmp/firebase_log.sh

          # Define stream_log helper
          cat > /tmp/stream_log.sh << 'LOGFUNC'
          #!/bin/bash
          # Batched Firebase log stream (avoid per-line curl during Flutter compile).
          # Flutter emits many "[  +N ms]" ticks that previously matched ^\[ and flooded RTDB.
          STEP_NAME="$1"
          LOG_BUFFER=""
          LINE_COUNT=0
          LAST_FLUSH=$(date +%s)
          flush_logs() {
            if [ -z "$LOG_BUFFER" ]; then return 0; fi
            if [ "${ENABLE_LOGGING:-true}" != "true" ]; then
              LOG_BUFFER=""
              LINE_COUNT=0
              LAST_FLUSH=$(date +%s)
              return 0
            fi
            if [ -n "$FIREBASE_DATABASE_URL" ] && [ -n "$FIREBASE_AUTH" ] && [ -n "$PENDING_ID" ]; then
              while [ "$(jobs -rp | wc -l | tr -d ' ')" -ge 4 ]; do sleep 0.05; done
              ESCAPED=$(echo -e "$LOG_BUFFER" | jq -Rs .)
              curl -sf -X POST "${FIREBASE_DATABASE_URL}/buildLogs/${PENDING_ID}/lines.json?auth=${FIREBASE_AUTH}" \
                -H "Content-Type: application/json" \
                -d "{\"step\":\"${STEP_NAME}\",\"text\":${ESCAPED},\"ts\":$(date +%s000)}" > /dev/null 2>&1 &
            fi
            LOG_BUFFER=""
            LINE_COUNT=0
            LAST_FLUSH=$(date +%s)
          }
          while IFS= read -r line; do
            echo "$line"
            if [ "${ENABLE_LOGGING:-true}" != "true" ]; then continue; fi
            # Drop noisy Flutter progress ticks; keep real output.
            if echo "$line" | grep -qE '^\[\s*\+[0-9]'; then continue; fi
            LOG_BUFFER="${LOG_BUFFER}${line}\n"
            LINE_COUNT=$((LINE_COUNT + 1))
            NOW=$(date +%s)
            if [ "$LINE_COUNT" -ge 40 ] || [ $((NOW - LAST_FLUSH)) -ge 3 ] || echo "$line" | grep -qE '✅|❌|⚠️|Error:|FAILURE|Built |✓ Built|Compiling'; then
              flush_logs
            fi
          done
          flush_logs
          wait 2>/dev/null || true
          LOGFUNC
          chmod +x /tmp/stream_log.sh

          /tmp/firebase_log.sh "init" "🚀 Android build started..."

      # ----- Clean up old Android build releases -----
      - name: Clean up old Android build releases
        env:
          PAT: ${{ secrets.SOURCE_REPO_PAT || github.token }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_AUTH: ${{ secrets.FIREBASE_DATABASE_SECRET }}
        run: |
          /tmp/firebase_log.sh "cleanup" "🗑️ Cleaning up old releases..."

          PUBLIC_REPO="${SOURCE_REPO}"

          echo "🗑️ Cleaning up old Android build releases from ${PUBLIC_REPO}..."
          OLD_RELEASES=$(curl -s \
            -H "Authorization: token $PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${PUBLIC_REPO}/releases?per_page=100")

          echo "$OLD_RELEASES" | jq -r '.[] | select(.tag_name | startswith("android-build-")) | "\(.id) \(.tag_name)"' | while read RELEASE_ID RELEASE_TAG; do
            echo "  Deleting release: $RELEASE_TAG"
            curl -s -X DELETE \
              -H "Authorization: token $PAT" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${PUBLIC_REPO}/releases/${RELEASE_ID}"
            curl -s -X DELETE \
              -H "Authorization: token $PAT" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${PUBLIC_REPO}/git/refs/tags/${RELEASE_TAG}" 2>/dev/null || true

            if [ -n "$FIREBASE_DATABASE_URL" ] && [ -n "$FIREBASE_AUTH" ]; then
              BUILD_ID="build-${RELEASE_TAG}"
              curl -s -X DELETE "${FIREBASE_DATABASE_URL}/buildReleases/${BUILD_ID}.json?auth=${FIREBASE_AUTH}" > /dev/null 2>&1 || true
              echo "    Removed Firebase entry: ${BUILD_ID}"
            fi
          done

          # Clean up orphaned Firebase entries and stale pending entries
          if [ -n "$FIREBASE_DATABASE_URL" ] && [ -n "$FIREBASE_AUTH" ]; then
            echo "🔍 Syncing Firebase buildReleases with GitHub..."
            EXISTING_TAGS=$(echo "$OLD_RELEASES" | jq -r '.[].tag_name' 2>/dev/null || echo "")
            FB_RELEASES=$(curl -s "${FIREBASE_DATABASE_URL}/buildReleases.json?auth=${FIREBASE_AUTH}&shallow=true" 2>/dev/null || echo "{}")
            if [ "$FB_RELEASES" != "null" ] && [ "$FB_RELEASES" != "{}" ] && [ -n "$FB_RELEASES" ]; then
              echo "$FB_RELEASES" | jq -r 'keys[]' 2>/dev/null | while read FB_ID; do
                TAG_FROM_ID="${FB_ID#build-}"
                if echo "$TAG_FROM_ID" | grep -q "^android-build-"; then
                  if ! echo "$EXISTING_TAGS" | grep -qF "$TAG_FROM_ID"; then
                    echo "  Removing orphaned Firebase entry: ${FB_ID}"
                    curl -s -X DELETE "${FIREBASE_DATABASE_URL}/buildReleases/${FB_ID}.json?auth=${FIREBASE_AUTH}" > /dev/null 2>&1 || true
                  fi
                fi
                if echo "$FB_ID" | grep -q "android.*pending"; then
                  ENTRY_DATA=$(curl -s "${FIREBASE_DATABASE_URL}/buildReleases/${FB_ID}.json?auth=${FIREBASE_AUTH}" 2>/dev/null)
                  CREATED_AT=$(echo "$ENTRY_DATA" | jq -r '.createdAt // 0')
                  NOW_MS=$(date +%s000)
                  AGE_MS=$((NOW_MS - CREATED_AT))
                  TWO_HOURS_MS=7200000
                  if [ "$AGE_MS" -gt "$TWO_HOURS_MS" ]; then
                    echo "  Removing stale pending entry: ${FB_ID} (age: $((AGE_MS / 60000)) minutes)"
                    curl -s -X DELETE "${FIREBASE_DATABASE_URL}/buildReleases/${FB_ID}.json?auth=${FIREBASE_AUTH}" > /dev/null 2>&1 || true
                    curl -s -X DELETE "${FIREBASE_DATABASE_URL}/buildLogs/${FB_ID}.json?auth=${FIREBASE_AUTH}" > /dev/null 2>&1 || true
                  fi
                fi
              done
            fi
          fi
          echo "✅ Old releases cleaned up"

      # ----- Clone source project -----
      - name: Clone source repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.SOURCE_BRANCH }}
          token: ${{ secrets.SOURCE_REPO_PAT || github.token }}
          fetch-depth: 1
          sparse-checkout: |
            remote_home
            packages/spacenxt_ops_ui
          sparse-checkout-cone-mode: true

      - name: Log checkout complete
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_AUTH: ${{ secrets.FIREBASE_DATABASE_SECRET }}
        run: |
          /tmp/firebase_log.sh "checkout" "✅ Source cloned successfully"

      # ----- Setup Java (required for Android) -----
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ----- Setup Flutter with caching -----
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-remotehome-and-${{ runner.os }}-stable

      - name: Flutter version
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_AUTH: ${{ secrets.FIREBASE_DATABASE_SECRET }}
        run: |
          VERSION=$(flutter --version 2>&1 | head -1)
          echo "$VERSION"
          /tmp/firebase_log.sh "flutter" "🔧 $VERSION"

      # ----- Ensure Android project exists -----
      - name: Ensure Android project exists
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_AUTH: ${{ secrets.FIREBASE_DATABASE_SECRET }}
        working-directory: remote_home
        run: |
          if [ ! -d "android" ]; then
            echo "Android directory not found. Creating Android platform files..."
            /tmp/firebase_log.sh "android" "📁 Creating Android project..."
            flutter create --platforms=android . 2>&1
          else
            /tmp/firebase_log.sh "android" "✅ Android project exists"
          fi

      # ----- Write google-services.json from secret -----
      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        working-directory: remote_home
        run: |
          mkdir -p android/app
          if [ ! -f "android/app/google-services.json" ]; then
            if [ -n "$GOOGLE_SERVICES_JSON" ]; then
              echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
              echo "✅ google-services.json written from secret"
            elif [ -f "google-services.json" ]; then
              cp google-services.json android/app/
              echo "✅ Copied google-services.json from repo root"
            else
              echo "❌ google-services.json not found! Add GOOGLE_SERVICES_JSON secret to the builder repo."
              exit 1
            fi
          else
            echo "✅ google-services.json already exists"
          fi

      # ----- Verify firebase_options.dart -----
      - name: Verify Firebase config
        working-directory: remote_home
        run: |
          if [ ! -f "lib/firebase_options.dart" ]; then
            echo "❌ firebase_options.dart not found in repo!"
            exit 1
          fi
          echo "✅ firebase_options.dart found"

      # ----- Cache and install dependencies -----
      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            remote_home/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('remote_home/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Get Flutter dependencies
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_AUTH: ${{ secrets.FIREBASE_DATABASE_SECRET }}
        working-directory: remote_home
        run: |
          curl -s -X PATCH "${FIREBASE_DATABASE_URL}/buildReleases/${PENDING_ID}.json?auth=${FIREBASE_AUTH}" \
            -H "Content-Type: application/json" \
            -d '{"step":"dependencies","stepLabel":"Getting dependencies..."}' &

          flutter pub get 2>&1 | /tmp/stream_log.sh "deps"

      # ----- Generate app icons -----
      - name: Generate app icons
        working-directory: remote_home
        run: |
          if [ -f "android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png" ]; then
            echo "✅ App icons already generated, skipping"
          else
            echo "🎨 Generating app icons..."
            dart run flutter_launcher_icons 2>&1 || true
          fi

      # ----- Cache Gradle ------
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('remote_home/android/build.gradle*', 'remote_home/android/app/build.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ----- Build APK (arm64-only CI artifact; store lane can still ship universal/AAB) -----
      - name: Build Flutter APK
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_AUTH: ${{ secrets.FIREBASE_DATABASE_SECRET }}
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true
        working-directory: remote_home
        run: |
          curl -s -X PATCH "${FIREBASE_DATABASE_URL}/buildReleases/${PENDING_ID}.json?auth=${FIREBASE_AUTH}" \
            -H "Content-Type: application/json" \
            -d '{"step":"compiling","stepLabel":"Compiling Android app..."}' &

          flutter build apk --release --no-tree-shake-icons --suppress-analytics \
            --target-platform=android-arm64 \
            --dart-define=RH_DEVICE_PROVISIONING_API_BASE_URL=https://us-central1-spacenxt-app.cloudfunctions.net \
            --dart-define=RH_ENABLE_COMMAND_API=true \
            2>&1 | /tmp/stream_log.sh "compile"
          echo "✅ Flutter APK build completed"

      # ----- Upload APK as a release artifact to PUBLIC repo -----
      - name: Upload APK
        env:
          PAT: ${{ secrets.SOURCE_REPO_PAT || github.token }}
        working-directory: remote_home
        run: |
          PUBLIC_REPO="${SOURCE_REPO}"
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          TAG="android-build-$(date +%Y%m%d-%H%M%S)"

          if [ ! -f "$APK_PATH" ]; then
            echo "❌ APK not found at $APK_PATH"
            find build -name "*.apk" -type f 2>/dev/null || true
            exit 1
          fi

          echo "📦 APK size: $(du -h $APK_PATH | cut -f1)"
          echo "📤 Uploading to PUBLIC repo: ${PUBLIC_REPO}"

          RELEASE_RESPONSE=$(curl -s -X POST \
            -H "Authorization: token ${PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${PUBLIC_REPO}/releases" \
            -d "{\"tag_name\":\"${TAG}\",\"name\":\"Android Build ${TAG}\",\"body\":\"APK built by CI from ${SOURCE_REPO}\",\"draft\":false,\"prerelease\":false}")

          UPLOAD_URL=$(echo "$RELEASE_RESPONSE" | grep -o '"upload_url": "[^"]*' | sed 's/"upload_url": "//' | sed 's/{.*//')

          if [ -z "$UPLOAD_URL" ]; then
            echo "❌ Failed to create release. Response:"
            echo "$RELEASE_RESPONSE"
            exit 1
          fi

          UPLOAD_RESPONSE=$(curl -s -X POST \
            -H "Authorization: token ${PAT}" \
            -H "Content-Type: application/octet-stream" \
            "${UPLOAD_URL}?name=SpaceNxt.apk" \
            --data-binary @"$APK_PATH")

          BROWSER_DOWNLOAD_URL=$(echo "$UPLOAD_RESPONSE" | jq -r '.browser_download_url // empty')

          if [ -z "$BROWSER_DOWNLOAD_URL" ]; then
            echo "⚠️ Upload may have failed. Response:"
            echo "$UPLOAD_RESPONSE"
            exit 1
          else
            echo "✅ APK uploaded to public repo: ${BROWSER_DOWNLOAD_URL}"
          fi

          RELEASE_URL="https://github.com/${PUBLIC_REPO}/releases/tag/${TAG}"
          echo "✅ Release page: ${RELEASE_URL}"

          echo "BUILD_TAG=${TAG}" >> $GITHUB_ENV
          echo "RELEASE_URL=${RELEASE_URL}" >> $GITHUB_ENV
          echo "APK_SIZE=$(stat -c%s "$APK_PATH" 2>/dev/null || stat -f%z "$APK_PATH" 2>/dev/null || echo 0)" >> $GITHUB_ENV
          echo "ASSET_DOWNLOAD_URL=${BROWSER_DOWNLOAD_URL}" >> $GITHUB_ENV

      # ----- Notify admin users about new build via Firebase -----
      - name: Notify admins about new build
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_AUTH: ${{ secrets.FIREBASE_DATABASE_SECRET }}
          PAT: ${{ secrets.SOURCE_REPO_PAT || github.token }}
        run: |
          if [ -z "$FIREBASE_DATABASE_URL" ] || [ -z "$FIREBASE_AUTH" ]; then
            echo "⚠️ Firebase secrets not set, skipping build notification"
            exit 0
          fi

          # Remove the pending build entry
          if [ -n "$PENDING_ID" ]; then
            curl -s -X DELETE "${FIREBASE_DATABASE_URL}/buildReleases/${PENDING_ID}.json?auth=${FIREBASE_AUTH}" > /dev/null 2>&1 || true
            curl -s -X DELETE "${FIREBASE_DATABASE_URL}/buildLogs/${PENDING_ID}.json?auth=${FIREBASE_AUTH}" > /dev/null 2>&1 || true
          fi

          if [ -z "$BUILD_TAG" ]; then
            echo "⚠️ No BUILD_TAG set, skipping notification"
            exit 0
          fi

          REPO="${SOURCE_REPO}"
          TAG="${BUILD_TAG}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          TIMESTAMP_MS=$(date +%s000)
          BUILD_ID="build-${TAG}"

          COMMIT_SHA=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          COMMIT_MSG=$(git log -1 --pretty=%B 2>/dev/null | head -1 || echo "No commit message")
          echo "COMMIT_SHA=${COMMIT_SHA}" >> $GITHUB_ENV
          echo "COMMIT_MSG=${COMMIT_MSG}" >> $GITHUB_ENV

          echo "📡 Fetching admin users from Firebase..."
          USERS_JSON=$(curl -s "${FIREBASE_DATABASE_URL}/users.json?auth=${FIREBASE_AUTH}")

          if [ -z "$USERS_JSON" ] || [ "$USERS_JSON" = "null" ]; then
            echo "⚠️ No users found in Firebase, skipping notification"
            exit 0
          fi

          ADMIN_UIDS=$(echo "$USERS_JSON" | jq -r '[to_entries[] | select(.value.role == "admin") | .key] | join(",")')

          if [ -z "$ADMIN_UIDS" ]; then
            echo "⚠️ No admin users found, skipping notification"
            exit 0
          fi

          ADMIN_UIDS_JSON=$(echo "$ADMIN_UIDS" | jq -R 'split(",")' 2>/dev/null || echo "[]")
          ADMIN_COUNT=$(echo "$ADMIN_UIDS_JSON" | jq 'length')
          echo "  Found ${ADMIN_COUNT} admin user(s)"

          echo "📝 Writing build release to Firebase..."
          curl -s -X PUT "${FIREBASE_DATABASE_URL}/buildReleases/${BUILD_ID}.json?auth=${FIREBASE_AUTH}" \
            -H "Content-Type: application/json" \
            -d "{
              \"id\": \"${BUILD_ID}\",
              \"platform\": \"android\",
              \"version\": \"${TAG}\",
              \"downloadUrl\": \"${ASSET_DOWNLOAD_URL}\",
              \"releaseUrl\": \"${RELEASE_URL}\",
              \"buildNumber\": \"${GITHUB_RUN_NUMBER:-0}\",
              \"commitSha\": \"${COMMIT_SHA}\",
              \"commitMessage\": $(echo "$COMMIT_MSG" | jq -Rs .),
              \"createdAt\": ${TIMESTAMP_MS},
              \"fileSizeBytes\": ${APK_SIZE:-0},
              \"status\": \"success\",
              \"notifiedUids\": ${ADMIN_UIDS_JSON}
            }"
          echo "  ✅ Build release recorded"

          NOTIFICATION_ID="build-notif-$(date +%s)-$RANDOM"
          echo "📬 Sending build notification to admins..."
          NOTIFICATION_JSON=$(jq -n \
            --arg id "$NOTIFICATION_ID" \
            --arg title "New Android Build Available" \
            --arg message "Build ${TAG} is ready for download" \
            --arg senderUid "system" \
            --arg senderName "CI Build System" \
            --argjson recipientUids "$ADMIN_UIDS_JSON" \
            --arg createdAt "$TIMESTAMP" \
            --arg buildReleaseId "$BUILD_ID" \
            '{
              id: $id,
              title: $title,
              message: $message,
              senderUid: $senderUid,
              senderName: $senderName,
              recipientUids: $recipientUids,
              sentToAll: false,
              createdAt: $createdAt,
              isRead: false,
              buildReleaseId: $buildReleaseId
            }')
          curl -s -X PUT "${FIREBASE_DATABASE_URL}/notifications/${NOTIFICATION_ID}.json?auth=${FIREBASE_AUTH}" \
            -H "Content-Type: application/json" \
            -d "$NOTIFICATION_JSON"
          echo "  ✅ Build notification sent to ${ADMIN_COUNT} admin(s)"

      # ----- Commit Android project files back -----
      - name: Commit Android project files to source repo
        working-directory: remote_home
        run: |
          BRANCH="${SOURCE_BRANCH}"

          rm -rf build
          rm -rf .dart_tool

          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          git add android/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "ℹ️ No Android changes to commit"
          else
            git commit -m "Update Android project files [ci-bot]"
            git push origin HEAD:${BRANCH}
            echo "✅ Android changes pushed (branch: ${BRANCH})"
          fi
