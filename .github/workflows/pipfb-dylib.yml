name: Build PiPFB dylib

on:
  push:
    branches: [main]
    paths:
      - "ios_dylibs/src/PiPFB.m"
      - "ios_dylibs/src/fishhook.c"
      - "ios_dylibs/src/fishhook.h"
      - "ios_dylibs/PiP.plist"
      - "ios_dylibs/scripts/ci-build-pipfb.sh"
  repository_dispatch:
    types: [build-pipfb-dylib, build-pip-dylib]
  workflow_dispatch:
    inputs:
      source_repo:
        description: "Optional source repo containing ios_dylibs (owner/repo)"
        required: false
        default: "supulvinod/pro-nxt"
        type: string
      branch:
        description: "Optional source branch"
        required: false
        default: "main"
        type: string

concurrency:
  group: dylib-build-pipfb-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - name: Resolve source target
        run: |
          SOURCE_REPO="${{ github.event.inputs.source_repo || github.event.client_payload.source_repo || 'supulvinod/pro-nxt' }}"
          SOURCE_BRANCH="${{ github.event.inputs.branch || github.event.client_payload.branch || 'main' }}"
          echo "SOURCE_REPO=$SOURCE_REPO" >> "$GITHUB_ENV"
          echo "SOURCE_BRANCH=$SOURCE_BRANCH" >> "$GITHUB_ENV"
          echo "Using source: $SOURCE_REPO@$SOURCE_BRANCH"

      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.SOURCE_BRANCH }}
          token: ${{ secrets.SOURCE_REPO_PAT || github.token }}
          path: source
          fetch-depth: 1
          lfs: false

      - name: Resolve build root
        run: |
          if [ -d "source/ios_dylibs" ]; then
            echo "BUILD_ROOT=source/ios_dylibs" >> "$GITHUB_ENV"
          elif [ -d "source" ]; then
            echo "::error::ios_dylibs directory not found in $SOURCE_REPO@$SOURCE_BRANCH"
            echo "Repository root contents:"
            ls -la source
            exit 1
          else
            echo "::error::Source checkout folder is missing"
            exit 1
          fi

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "No Xcode found!"
            exit 1
          fi
          sudo xcode-select -s "$XCODE_PATH"
          echo "Using: $(xcodebuild -version)"
          echo "SDK: $(xcrun --sdk iphoneos --show-sdk-version)"

      - name: Build PiPFB dylib
        working-directory: ${{ env.BUILD_ROOT }}
        run: |
          chmod +x scripts/ci-build-pipfb.sh scripts/build.sh
          ./scripts/ci-build-pipfb.sh
          test -f build/PiP.dylib
          test ! -f build/PiPEnabler.dylib && test ! -f build/EasyFB.dylib
          cp build/PiP.dylib build/PiPFB.dylib
          ls -lh build/PiPFB.dylib

      - name: Create release in source repository
        env:
          PAT: ${{ secrets.SOURCE_REPO_PAT || github.token }}
        run: |
          PUBLIC_REPO="${SOURCE_REPO}"
          TAG="pipfb-dylib-$(date +%Y%m%d-%H%M%S)"
          PREFIX="pipfb-dylib-"

          page=1
          while :; do
            OLD_RELEASES=$(curl -s \
              -H "Authorization: token $PAT" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${PUBLIC_REPO}/releases?per_page=100&page=${page}")
            COUNT=$(echo "$OLD_RELEASES" | jq 'length')
            if [ "$COUNT" -eq 0 ]; then
              break
            fi
            echo "$OLD_RELEASES" | jq -r --arg prefix "$PREFIX" '.[] | select(.tag_name | startswith($prefix)) | "\(.id) \(.tag_name)"' | while read RELEASE_ID RELEASE_TAG; do
              if [ -z "$RELEASE_ID" ]; then
                continue
              fi
              curl -s -X DELETE \
                -H "Authorization: token $PAT" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${PUBLIC_REPO}/releases/${RELEASE_ID}"
              curl -s -X DELETE \
                -H "Authorization: token $PAT" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${PUBLIC_REPO}/git/refs/tags/${RELEASE_TAG}" 2>/dev/null || true
            done
            page=$((page + 1))
          done

          RELEASE=$(curl -s -X POST \
            -H "Authorization: token $PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${PUBLIC_REPO}/releases" \
            -d "{
              \"tag_name\": \"${TAG}\",
              \"name\": \"PiPFB.dylib\",
              \"body\": \"**PiPFB.dylib** - Substrate-free PiP for Facebook\",
              \"draft\": false,
              \"prerelease\": false
            }")

          UPLOAD_URL=$(echo "$RELEASE" | jq -r '.upload_url' | sed 's/{.*}//')
          if [ -z "$UPLOAD_URL" ] || [ "$UPLOAD_URL" = "null" ]; then
            echo "$RELEASE" | jq . || echo "$RELEASE"
            exit 1
          fi

          curl -s -X POST \
            -H "Authorization: token $PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/octet-stream" \
            "${UPLOAD_URL}?name=PiPFB.dylib" \
            --data-binary @"${BUILD_ROOT}/build/PiPFB.dylib"
